name: Flutter Cross-Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Android ─────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: ${{ runner.tool_cache }}/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run unit and widget tests
        run: flutter test test/unit test/widget

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  # ─── iOS (без подписи) ───────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run unit and widget tests
        run: flutter test test/unit test/widget

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: build/ios/iphoneos/Runner.app

  # ─── Linux Desktop ───────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run unit and widget tests
        run: flutter test test/unit test/widget

      - name: Build Linux executable
        run: flutter build linux --debug

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-debug-bundle
          path: build/linux/x64/debug/bundle

  # ─── Web ─────────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run unit and widget tests
        run: flutter test test/unit test/widget

      - name: Build web
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  # ─── Windows Desktop ─────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run unit and widget tests
        run: flutter test test/unit test/widget

      - name: Build Windows executable
        run: flutter build windows --debug

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug-exe
          path: build/windows/x64/runner/Debug/*.exe

  # ─── Интеграционные тесты (на Android-эмуляторе/реальном устройстве — опционально) ──
  integration-test:
    runs-on: ubuntu-latest
    needs: build-android      # дождаться сборки Android, чтобы протестировать
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests (headless)
        run: flutter test integration_test/app_test.dart
