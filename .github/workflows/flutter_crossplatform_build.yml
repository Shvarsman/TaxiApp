name: Flutter Cross-Platform Build (No Tests)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Android ─────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  # ─── iOS (без подписи) ───────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build ios --no-codesign --debug
      - uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: build/ios/iphoneos/Runner.app

  # ─── Linux Desktop ───────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build linux --debug
      - uses: actions/upload-artifact@v4
        with:
          name: linux-debug-bundle
          path: build/linux/x64/debug/bundle

  # ─── Web ─────────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  # ─── Windows Desktop ─────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build windows --debug
      - uses: actions/upload-artifact@v4
        with:
          name: windows-debug-exe
          path: build/windows/x64/runner/Debug/*.exe
